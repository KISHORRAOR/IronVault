<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IronVault — Reset Password</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark">🔑</div>
      <h1>Reset Password</h1>
      <p>Verify your mobile to reset master password</p>
    </div>

    <div id="s1Err" class="msg error"></div>
    <div id="otpMsg" class="msg info" style="display:none">OTP sent! Check your phone or server terminal.</div>
    <div id="s2Err" class="msg error" style="display:none"></div>
    <div id="s2Ok"  class="msg success" style="display:none"></div>

    <div class="fg">
      <label>Registered Mobile</label>
      <div class="input-row">
        <input type="tel" id="mobile" placeholder="10-digit mobile" maxlength="10" inputmode="numeric">
        <button class="btn btn-secondary btn-sm" id="otpBtn" onclick="sendOTP()">Send OTP</button>
      </div>
    </div>

    <div id="step2" style="display:none">
      <div class="fg">
        <label>OTP</label>
        <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6" inputmode="numeric">
      </div>
      <div class="fg">
        <label>New Master Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw" placeholder="Min 8 characters"
                 oninput="checkStrength(this.value,'b','sLabel')">
          <button class="eye" onclick="toggleEye('pw',this)">👁</button>
        </div>
        <div class="strength-bars">
          <div class="bar" id="b1"></div><div class="bar" id="b2"></div>
          <div class="bar" id="b3"></div><div class="bar" id="b4"></div>
        </div>
        <div class="strength-label" id="sLabel"></div>
      </div>
      <div class="fg">
        <label>Confirm New Password</label>
        <div class="pw-wrap">
          <input type="password" id="cpw" placeholder="Repeat password">
          <button class="eye" onclick="toggleEye('cpw',this)">👁</button>
        </div>
      </div>
      <button class="btn btn-primary" id="resetBtn" onclick="resetPw()">Reset Password</button>
    </div>

    <div class="link-row"><a href="/login.html">← Back to Login</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/utils.js"></script>
<script>
  async function sendOTP() {
    const mobile = document.getElementById('mobile').value.trim()
    hideMsg('s1Err')
    if (!validMobile(mobile)) { showMsg('s1Err', 'Enter a valid 10-digit mobile number.'); return }
    const btn = document.getElementById('otpBtn')
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'
    try {
      const res  = await fetch('https://ironvault-rh8x.onrender.com/api/auth/send-reset-otp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mobile })
      })
      const data = await res.json()
      if (res.ok) {
        document.getElementById('otpMsg').style.display  = 'block'
        document.getElementById('step2').style.display   = 'block'
        document.getElementById('mobile').disabled        = true
        btn.textContent = 'Resend'
        let cd = 30
        const iv = setInterval(() => {
          btn.disabled = true; btn.textContent = `Resend (${cd}s)`; cd--
          if (cd < 0) { clearInterval(iv); btn.disabled = false; btn.textContent = 'Resend' }
        }, 1000)
      } else { showMsg('s1Err', data.message); btn.disabled = false; btn.textContent = 'Send OTP' }
    } catch (e) { showMsg('s1Err', 'Cannot reach server.'); btn.disabled = false; btn.textContent = 'Send OTP' }
  }

  async function resetPw() {
    const mobile = document.getElementById('mobile').value.trim()
    const otp    = document.getElementById('otp').value.trim()
    const pw     = document.getElementById('pw').value
    const cpw    = document.getElementById('cpw').value
    const btn    = document.getElementById('resetBtn')
    hideMsg('s2Err'); hideMsg('s2Ok')
    if (!otp || otp.length !== 6) { showMsg('s2Err', 'Enter the 6-digit OTP.'); return }
    if (!pw || pw.length < 8)     { showMsg('s2Err', 'Password must be at least 8 characters.'); return }
    if (pw !== cpw)               { showMsg('s2Err', 'Passwords do not match.'); return }
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Resetting…'
    try {
      const res  = await fetch('https://ironvault-rh8x.onrender.com/api/auth/reset-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mobile, otp, newPassword: pw })
      })
      const data = await res.json()
      if (res.ok) {
        showMsg('s2Ok', '✓ Password reset! Redirecting…', 'success')
        setTimeout(() => location.href = '/login.html', 2000)
      } else { showMsg('s2Err', data.message) }
    } catch (e) { showMsg('s2Err', 'Cannot reach server.') }
    btn.disabled = false; btn.innerHTML = 'Reset Password'
  }
</script>
</body>
</html>
